<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUG FINDER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #7c2d12 0%, #991b1b 50%, #7f1d1d 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 4.5rem;
            margin: 10px 0;
        }
        
        .subtitle {
            color: #fca5a5;
            font-size: 1.65rem;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .map-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 15px;
            height: 900px;
        }
        
        #map {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: #334155;
        }
        
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .status-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 30px;
            font-size: 1.2rem;
        }
        
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
        }
        
        .status-dot.scanning {
            background: #fbbf24;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .confidence {
            color: #fca5a5;
            font-size: 0.9rem;
        }
        
        .location-info h2 {
            color: #f87171;
            font-size: 2.25rem;
            margin-bottom: 8px;
        }
        
        .activity {
            color: #fecaca;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .coords, .timestamp {
            color: #fca5a5;
            font-size: 1.1rem;
        }
        
        .scanning-animation {
            text-align: center;
            padding: 40px 0;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(239, 68, 68, 0.3);
            border-top-color: #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert-box {
            background: rgba(234, 179, 8, 0.2);
            border: 2px solid #eab308;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 10px;
            font-size: 1.2rem;
        }
        
        .alert-title {
            color: #fde047;
            font-weight: bold;
        }
        
        .stats-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 30px;
        }
        
        .stats-title {
            color: #fca5a5;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }
        
        .stat-label {
            color: #fecaca;
        }
        
        .stat-value {
            font-weight: bold;
        }
        
        .locate-btn {
            width: 100%;
            padding: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: #dc2626;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .locate-btn:hover:not(:disabled) {
            background: #b91c1c;
            transform: scale(1.02);
        }
        
        .locate-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        
        .footer {
            text-align: center;
            color: #fca5a5;
            font-size: 0.85rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐛 BUG FINDER 🍗</h1>
            <p class="subtitle">Chicken Tender Detection & Tracking System</p>
        </div>
        
        <div class="main-grid">
            <div class="map-container">
                <div id="map"></div>
            </div>
            
            <div class="info-panel">
                <div class="status-box">
                    <div class="status-header">
                        <div class="status-indicator">
                            <div class="status-dot" id="statusDot"></div>
                            <span id="statusText">INITIALIZING...</span>
                        </div>
                        <div class="confidence" id="confidence">--</div>
                    </div>
                    
                    <div id="locationContent">
                        <div class="scanning-animation">
                            <div class="spinner"></div>
                            <p>Scanning for tendies...</p>
                        </div>
                    </div>
                </div>
                
                <div class="alert-box">
                    <div>⚠️</div>
                    <div>
                        <div class="alert-title">WARNING:</div>
                        <div>Subject only eats chicken tenders. Approach with nuggets.</div>
                    </div>
                </div>
                
                <div class="stats-box">
                    <div class="stats-title">TRACKING STATS</div>
                    <div class="stat-row">
                        <span class="stat-label">Scans:</span>
                        <span class="stat-value" id="scanCount">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Status:</span>
                        <span class="stat-value" style="color: #f87171;">ACTIVE</span>
                    </div>
                </div>
                
                <button class="locate-btn" id="locateBtn" onclick="findBug()" disabled>
                    INITIALIZING...
                </button>
            </div>
        </div>
        
        <div class="footer">
            🍗 For entertainment purposes only. No BUGS harmed in the making of this tracker.
        </div>
    </div>

                marker = L.marker([43.0481, -76.1474], { icon: customIcon }).addTo(map);
                
                initialized = true;
                document.getElementById('locateBtn').disabled = false;
                document.getElementById('locateBtn').textContent = 'LOCATE BUG';
                
                setTimeout(findBug, 500);
            } catch (error) {
                console.error('Initialization error:', error);
                document.getElementById('locationContent').innerHTML = '<p style="color: #ef4444;">Map loading error. Please refresh.</p>';
            }
        }
        
        initializeMap();
        
        function findBug() {
            if (!initialized || scanning) return;
            
            scanning = true;
            scanCount++;
            
            document.getElementById('scanCount').textContent = scanCount;
            document.getElementById('statusText').textContent = 'SCANNING...';
            document.getElementById('statusDot').classList.add('scanning');
            document.getElementById('locateBtn').disabled = true;
            document.getElementById('locateBtn').textContent = 'SCANNING...';
            
            document.getElementById('locationContent').innerHTML = `
                <div class="scanning-animation">
                    <div class="spinner"></div>
                    <p>Triangulating tendies...</p>
                </div>
            `;
            
            setTimeout(() => {
                const location = locations[Math.floor(Math.random() * locations.length)];
                const confidence = Math.floor(Math.random() * 15) + 85;
                
                marker.setLatLng([location.lat, location.lng]);
                map.flyTo([location.lat, location.lng], 14, { duration: 1.5 });
                
                document.getElementById('statusText').textContent = 'LOCKED';
                document.getElementById('statusDot').classList.remove('scanning');
                document.getElementById('confidence').textContent = confidence + '%';
                document.getElementById('locateBtn').disabled = false;
                document.getElementById('locateBtn').textContent = 'LOCATE BUG';
                
                const now = new Date();
                document.getElementById('locationContent').innerHTML = `
                    <div class="location-info">
                        <h2>${location.name}</h2>
                        <p class="activity">${location.activity}</p>
                        <p class="coords">${location.lat.toFixed(4)}°N, ${Math.abs(location.lng).toFixed(4)}°W</p>
                        <p class="timestamp">${now.toLocaleTimeString()}</p>
                    </div>
                `;
                
                scanning = false;
            }, 2000);
        }
    </script>
